apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/prometheus-rules.yaml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'sre-arena'
        metrics_path: /metrics
        static_configs:
          - targets: ['sre-arena:80']

  prometheus-rules.yaml: |
    groups:
      - name: sre-arena-slo-alerts
        rules:

          # =========================
          # RECORDING RULES (SLO base)
          # =========================

          - record: sre_arena:http_requests:rate5m
            expr: sum(rate(http_requests_total{job="sre-arena"}[5m]))

          - record: sre_arena:http_errors:rate5m
            expr: sum(rate(http_requests_total{job="sre-arena",status_code=~"5.."}[5m]))

          - record: sre_arena:http_error_rate:5m
            expr: |
              sum(rate(http_requests_total{job="sre-arena",status_code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job="sre-arena"}[5m]))

          - record: sre_arena:http_latency_p95:5m
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(http_request_duration_ms_bucket{job="sre-arena"}[5m])) by (le)
              )

          # =========================
          # ALERTAS
          # =========================

          - alert: SreArenaHighErrorRate
            expr: sre_arena:http_error_rate:5m > 0.01
            for: 2m
            labels:
              severity: warning
              service: sre-arena
              slo: availability
            annotations:
              summary: "Alta taxa de erro na API sre-arena"
              description: "Taxa de erro 5xx acima de 1% nos últimos 5 minutos."

          - alert: SreArenaHighLatencyP95
            expr: sre_arena:http_latency_p95:5m > 500
            for: 2m
            labels:
              severity: warning
              service: sre-arena
              slo: latency
            annotations:
              summary: "Latência p95 alta na API sre-arena"
              description: "Latência p95 acima de 500ms nos últimos 5 minutos."

          - alert: SreArenaExternalApiErrors
            expr: sum(rate(external_api_errors_total{job="sre-arena"}[5m])) > 0
            for: 2m
            labels:
              severity: warning
              service: sre-arena
            annotations:
              summary: "Erros na API externa"
              description: "Falhas ao consumir a API externa."

          - alert: SreArenaNoTraffic
            expr: sum(rate(http_requests_total{job="sre-arena"}[5m])) == 0
            for: 5m
            labels:
              severity: info
              service: sre-arena
            annotations:
              summary: "Sem tráfego na API sre-arena"
              description: "Nenhuma requisição foi registrada nos últimos 5 minutos."