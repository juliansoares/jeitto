apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-arena
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-arena
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sre-arena
    spec:
      containers:
        - name: sre-arena
          image: sre-arena:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "80Mi"
            limits:
              cpu: "500m"
              memory: "150Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
